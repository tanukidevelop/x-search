name: X API Search & Email

# 検索クエリは config.yaml で管理します
# 新しい検索を追加: config.yaml を編集して search_queries に追加してください

on:
  schedule:
    - cron: '0 3,7,11,15,19,21 * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run X API search
        run: python search_tweets.py --output csv
        env:
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}

      - name: Export to JSON for email
        run: |
          python -c "
          import json
          import csv
          tweets = []
          with open('tweets.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  tweets.append({
                      'id': row['id'],
                      'username': row['username'],
                      'text': row['text'],
                      'public_metrics': {'like_count': int(row['likes'])},
                      'created_at': row['created_at'],
                  })
          with open('tweets.json', 'w', encoding='utf-8') as f:
              json.dump(tweets, f, ensure_ascii=False, indent=2)
          "

      - name: Send email
        if: success()
        run: python send_email.py tweets.json ${{ secrets.RECIPIENT_EMAIL }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

      - name: Display results
        run: |
          echo "✅ ツイート検索完了"
          echo ""
          cat tweets.csv

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: tweets-result
          path: tweets.csv
