name: X API Search & Email

# 検索クエリは config.yaml で管理します
# 新しい検索を追加: config.yaml を編集して search_queries に追加してください

on:
  schedule:
    - cron: '0 3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run X API search
        run: python search_tweets.py --output csv
        env:
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}

      - name: Display results
        run: |
          echo "✅ ツイート検索完了"
          echo ""
          cat tweets.csv
          
      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: tweets-result
          path: tweets.csv
