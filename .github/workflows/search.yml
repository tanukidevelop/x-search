name: X API Search & Email

# アカウント設定（ここに追加するだけで反映される）
env:
  SEARCH_ACCOUNTS: "denfaminicogame,livedoornews"
  MIN_LIKES: "1000"

on:
  schedule:
    - cron: '0 3,6,9,12,15,18,21 * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run X API search
        run: python search_tweets.py --min_likes ${{ env.MIN_LIKES }} --output csv --accounts "${{ env.SEARCH_ACCOUNTS }}"
        env:
          X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}

      - name: Display results
        run: |
          echo "✅ ツイート検索完了"
          echo ""
          cat tweets.csv
          
      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: tweets-result
          path: tweets.csv
